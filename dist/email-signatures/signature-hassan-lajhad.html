<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Handtekening — Hassan Lajhad</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Audiowide&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body style="margin: 0; padding: 16px; background: #e5e5e5">
    <!--
      Klikbare website: gebruik HTML in je mailclient (niet de PNG).
      Afbeelding: absolute URL naar jullie site. Er is geen indexpagina op /images/ — alleen directe
      bestands-URL's (zoals elke foto op de site). Ontvangers van mail kunnen die URL in de bron zien;
      dat hoort bij e-mail met externe afbeeldingen. Zelfde bestanden als op de website (Who we are).
    -->
    <table
      role="presentation"
      cellpadding="0"
      cellspacing="0"
      border="0"
      style="
        border-collapse: collapse;
        background-color: #fafaf8;
        border: 1px solid #d6d3d1;
        border-radius: 12px;
        overflow: hidden;
        max-width: 560px;
        font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      "
    >
      <tr>
        <td style="width: 4px; background-color: #4a6c6f; padding: 0; line-height: 0; font-size: 0">&nbsp;</td>
        <td style="padding: 20px 24px 20px 20px; vertical-align: middle">
          <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="border-collapse: collapse">
            <tr>
              <td style="vertical-align: middle; padding: 0 20px 0 0">
                <img
                  src="https://elazgroup.com/images/founder1.jpg"
                  alt=""
                  width="88"
                  height="88"
                  style="
                    display: block;
                    width: 88px;
                    height: 88px;
                    border-radius: 50%;
                    border: 1px solid #d6d3d1;
                    object-fit: cover;
                  "
                />
              </td>
              <td style="vertical-align: middle; padding: 0">
                <p
                  style="
                    margin: 0 0 6px 0;
                    font-family: Audiowide, 'Arial Black', sans-serif;
                    font-size: 11px;
                    letter-spacing: 0.08em;
                    line-height: 1.2;
                  "
                >
                  <a
                    href="https://elazgroup.com"
                    style="color: #4a6c6f; text-decoration: none"
                    >ELAZ GROUP</a
                  >
                </p>
                <p
                  style="
                    margin: 0 0 4px 0;
                    font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                    font-weight: 600;
                    font-size: 19px;
                    letter-spacing: -0.02em;
                    color: #1c1917;
                    line-height: 1.15;
                  "
                >
                  Hassan Lajhad
                </p>
                <p
                  style="
                    margin: 0 0 10px 0;
                    font-size: 13px;
                    font-weight: 500;
                    color: #57534e;
                    line-height: 1.35;
                    max-width: 340px;
                  "
                >
                  Co-founder — Technology &amp; AI Implementation
                </p>
                <p style="margin: 0 0 4px 0; font-size: 12px; line-height: 1.5">
                  <a
                    href="https://elazgroup.com"
                    style="color: #4a6c6f; text-decoration: underline; font-weight: 600"
                    >elazgroup.com</a
                  >
                </p>
                <p style="margin: 0; font-size: 12px; color: #a8a29e; line-height: 1.5">
                  Uitbreidingstraat 84, 2600 Antwerpen, België
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
