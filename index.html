<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="description" content="ELAZ Group - A collaboration structure delivering integrated solutions.">
    <title>ELAZ Group</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Orbitron:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: #ffffff;
            background: #0f1626;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, 
                rgba(15, 23, 42, 1) 0%, 
                rgba(30, 41, 59, 0.95) 100%);
            z-index: 0;
            pointer-events: none;
        }

        .logo-fullscreen {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            opacity: 0;
            animation: logoFadeIn 1s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .logo-fullscreen.hidden {
            opacity: 0 !important;
            transform: translate(-50%, -50%) scale(0.8) !important;
            pointer-events: none;
        }

        @keyframes logoFadeIn {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.8);
            }
            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .scroll-arrow {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 11;
            opacity: 0;
            animation: arrowFadeIn 1s cubic-bezier(0.4, 0, 0.2, 1) 2s forwards, pulse 2s ease-in-out infinite 3s;
            cursor: pointer;
            transition: opacity 0.4s ease;
        }

        .scroll-arrow.hidden {
            opacity: 0 !important;
            pointer-events: none;
            visibility: hidden;
            animation: none;
        }

        .scroll-arrow:hover {
            opacity: 0.8;
        }

        @keyframes arrowFadeIn {
            to {
                opacity: 0.5;
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.5;
                transform: translateX(-50%) translateY(0);
            }
            50% {
                opacity: 0.8;
                transform: translateX(-50%) translateY(-8px);
            }
        }

        .scroll-arrow svg {
            width: 1.25rem;
            height: 1.25rem;
            stroke: rgba(255, 255, 255, 0.6);
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: stroke 0.3s ease;
        }

        .scroll-arrow:hover svg {
            stroke: rgba(255, 255, 255, 0.9);
        }

        .logo-fullscreen .logo-main {
            font-size: 12rem;
            font-weight: 100;
            letter-spacing: 0;
            color: #ffffff;
            line-height: 1;
            text-transform: uppercase;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.12em;
            font-family: 'Audiowide', 'Orbitron', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        .logo-fullscreen .logo-main .logo-letter {
            font-weight: 300;
            letter-spacing: 0;
            line-height: 1;
        }

        .logo-fullscreen .logo-main .logo-letter.e {
            font-weight: 300;
        }

        .logo-fullscreen .logo-main .logo-letter.l {
            font-weight: 300;
        }

        .logo-fullscreen .logo-main .logo-letter.a {
            font-weight: 300;
        }

        .logo-fullscreen .logo-main .logo-letter.z {
            font-weight: 400;
        }

        .logo-fullscreen {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-fullscreen .logo-sub {
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 0.6em;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            margin-top: 1.5rem;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            width: 100%;
        }

        .logo-fullscreen .logo-sub::before,
        .logo-fullscreen .logo-sub::after {
            content: '';
            width: calc((100% - 8rem) / 2);
            max-width: 12rem;
            height: 1px;
            background: rgba(255, 255, 255, 0.3);
        }

        .logo-fullscreen .logo-sub span {
            flex-shrink: 0;
        }

        .container {
            max-width: 700px;
            width: 100%;
            background: transparent;
            padding: 5rem 3rem;
            text-align: center;
            position: relative;
            z-index: 1;
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1), transform 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .container.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .logo {
            margin-bottom: 2rem;
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1) 0.2s, transform 1s cubic-bezier(0.4, 0, 0.2, 1) 0.2s;
        }

        .container.visible .logo {
            opacity: 1;
            transform: translateY(0);
        }

        .logo-main {
            font-size: 3.75rem;
            font-weight: 200;
            letter-spacing: 0;
            color: #ffffff;
            line-height: 1;
            text-transform: uppercase;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.08em;
            font-family: 'Audiowide', 'Orbitron', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        .logo-main .logo-letter {
            font-weight: 300;
            letter-spacing: 0;
            line-height: 1;
        }

        .logo-main .logo-letter.e {
            font-weight: 300;
        }

        .logo-main .logo-letter.l {
            font-weight: 300;
        }

        .logo-main .logo-letter.a {
            font-weight: 300;
        }

        .logo-main .logo-letter.z {
            font-weight: 400;
        }

        .logo-sub {
            font-size: 0.75rem;
            font-weight: 300;
            letter-spacing: 0.6em;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            margin-top: 0.5rem;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            width: 100%;
        }

        .logo-sub::before,
        .logo-sub::after {
            content: '';
            width: calc((100% - 4rem) / 2);
            max-width: 3rem;
            height: 1px;
            background: rgba(255, 255, 255, 0.3);
        }

        .logo-sub span {
            flex-shrink: 0;
        }

        .subtitle {
            font-size: 1.125rem;
            color: rgba(255, 255, 255, 0.85);
            font-weight: 300;
            margin-bottom: 2.5rem;
            line-height: 1.6;
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1) 0.4s, transform 1s cubic-bezier(0.4, 0, 0.2, 1) 0.4s;
        }

        .container.visible .subtitle {
            opacity: 1;
            transform: translateY(0);
        }

        .body-text {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.75);
            line-height: 1.8;
            margin-bottom: 3rem;
            text-align: center;
            max-width: 550px;
            margin-left: auto;
            margin-right: auto;
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1) 0.6s, transform 1s cubic-bezier(0.4, 0, 0.2, 1) 0.6s;
        }

        .container.visible .body-text {
            opacity: 1;
            transform: translateY(0);
        }

        .contact {
            margin-bottom: 3rem;
            padding-top: 2.5rem;
            border-top: 1px solid rgba(100, 150, 200, 0.2);
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1) 0.8s, transform 1s cubic-bezier(0.4, 0, 0.2, 1) 0.8s;
        }

        .container.visible .contact {
            opacity: 1;
            transform: translateY(0);
        }

        .contact a {
            color: rgba(150, 200, 255, 0.9);
            text-decoration: none;
            font-size: 1.125rem;
            font-weight: 400;
            transition: color 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .contact a:hover {
            color: rgba(180, 220, 255, 1);
        }

        .envelope-icon {
            width: 1.125rem;
            height: 1.125rem;
            stroke: #ffffff;
            fill: none;
            opacity: 0.9;
        }

        footer {
            margin-top: 2.5rem;
            padding-top: 2.5rem;
            border-top: 1px solid rgba(100, 150, 200, 0.15);
            font-size: 0.875rem;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 300;
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1) 1s, transform 1s cubic-bezier(0.4, 0, 0.2, 1) 1s;
        }

        .container.visible footer {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 600px) {
            body {
                padding: 1rem 0.75rem;
            }

            .logo-fullscreen .logo-main {
                font-size: 5.5rem;
                gap: 0.08em;
            }

            .logo-fullscreen .logo-sub {
                font-size: 1.25rem;
                letter-spacing: 0.4em;
                margin-top: 1rem;
                gap: 1rem;
            }

            .logo-fullscreen .logo-sub::before,
            .logo-fullscreen .logo-sub::after {
                max-width: 4rem;
            }

            .scroll-arrow {
                bottom: 1.5rem;
            }

            .scroll-arrow svg {
                width: 1.125rem;
                height: 1.125rem;
            }

            .container {
                padding: 3rem 1.5rem;
                max-width: 100%;
            }

            .logo {
                margin-bottom: 1.5rem;
            }

            .logo-main {
                font-size: 2.5rem;
                gap: 0.06em;
            }
            
            .logo-sub {
                font-size: 0.625rem;
                letter-spacing: 0.4em;
                margin-top: 0.4rem;
                gap: 0.75rem;
            }

            .logo-sub::before,
            .logo-sub::after {
                max-width: 2.5rem;
            }

            .subtitle {
                font-size: 0.9375rem;
                margin-bottom: 2rem;
            }

            .body-text {
                font-size: 0.875rem;
                line-height: 1.7;
                margin-bottom: 2.5rem;
                max-width: 100%;
            }

            .contact {
                margin-bottom: 2.5rem;
                padding-top: 2rem;
            }

            .contact a {
                font-size: 0.9375rem;
                padding: 0.5rem 1rem;
            }

            footer {
                margin-top: 2rem;
                padding-top: 2rem;
                font-size: 0.8125rem;
            }
        }

        @media (max-width: 400px) {
            .logo-fullscreen .logo-main {
                font-size: 4.5rem;
            }

            .logo-fullscreen .logo-sub {
                font-size: 1rem;
            }

            .logo-main {
                font-size: 2rem;
            }

            .container {
                padding: 2.5rem 1.25rem;
            }
        }
    </style>
</head>
<body>
    <div class="logo-fullscreen" id="logoFullscreen">
        <h1 class="logo-main">
            <span class="logo-letter e">E</span>
            <span class="logo-letter l">L</span>
            <span class="logo-letter a">A</span>
            <span class="logo-letter z">Z</span>
        </h1>
        <div class="logo-sub"><span>GROUP</span></div>
    </div>

    <div class="scroll-arrow" id="scrollArrow">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M7 10l5 5 5-5" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </div>

    <div class="container" id="container">
        <div class="logo">
            <h1 class="logo-main">
                <span class="logo-letter e">E</span>
                <span class="logo-letter l">L</span>
                <span class="logo-letter a">A</span>
                <span class="logo-letter z">Z</span>
            </h1>
            <div class="logo-sub"><span>GROUP</span></div>
        </div>
        
        <p class="subtitle">A collaboration structure delivering integrated solutions.</p>

        <p class="body-text">
            ELAZ Group creates software and digital solutions designed to support businesses in their daily operations.
        </p>

        <div class="contact">
            <a href="mailto:info@elazgroup.com">
                <svg class="envelope-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M22 6l-10 7L2 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                info@elazgroup.com
            </a>
        </div>

        <footer>
            <p>&copy; <span id="year"></span> — ELAZ Group. All rights reserved.</p>
        </footer>
    </div>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();

        const scrollArrow = document.getElementById('scrollArrow');
        const logoFullscreen = document.getElementById('logoFullscreen');
        const container = document.getElementById('container');

        scrollArrow.addEventListener('click', function() {
            logoFullscreen.classList.add('hidden');
            scrollArrow.classList.add('hidden');
            container.classList.add('visible');
        });
    </script>
</body>
</html>
