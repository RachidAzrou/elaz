<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ELAZ Group logo export</title>
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Audiowide&family=Space+Grotesk:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        box-sizing: border-box;
      }
      html,
      body {
        background: transparent;
      }
      #capture {
        display: inline-block;
        padding: 48px 56px;
        text-align: center;
      }
      .brand {
        font-family: "Audiowide", sans-serif;
        font-weight: 400;
        font-size: clamp(48px, 8vw, 80px);
        letter-spacing: 0.04em;
        line-height: 1.1;
        color: #1c1917;
        white-space: nowrap;
      }
      .rule {
        height: 4px;
        width: 100%;
        margin-top: 18px;
        margin-bottom: 16px;
        background: #4a6c6f;
        border-radius: 1px;
      }
      .tag {
        font-family: "Space Grotesk", sans-serif;
        font-weight: 500;
        font-size: clamp(15px, 2.2vw, 22px);
        letter-spacing: -0.02em;
        line-height: 1.35;
        color: #57534e;
        max-width: 36em;
        margin: 0 auto;
      }
    </style>
  </head>
  <body>
    <div id="capture">
      <div class="brand">ELAZ GROUP</div>
      <div class="rule" aria-hidden="true"></div>
      <div class="tag">Digital products, built with purpose</div>
    </div>
  </body>
</html>
